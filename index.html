<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Biznes fabrika | Login</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >
<link rel="shortcut icon" href="img/logo.png" type="image/x-icon">
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    >

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="login-page">

    <div class="login-brand">

        <img
            src="img/logo.png"
            class="brand-logo"
            alt="Dasturlash Akademiyasi logotipi"
        >

        <h1>BIZNES FABRIKA</h1>

        <p>
            Ma'lumotnoma va sertifikatlarni boshqarish tizimi
        </p>

        <div class="brand-features">

            <div>
                <i class="bi bi-file-earmark-text-fill"></i>
                Xavfsiz admin panel
            </div>

            <div>
                <i class="bi bi-award-fill"></i>
                Sertifikat, Ma'lumotnoma va diplomlar
            </div>

           
            <div style="
display:flex;
align-items:center;
gap:10px;
font-size:15px;
">

<i class="bi bi-laptop" style="
font-size:22px;
color: white;
"></i>

<span>Dasturchi:</span>

<a
href="https://telegram.me/Ziyovuddin02"
target="_blank"
style="
color:#38bdf8;
font-weight:700;
text-decoration:none;
"
>
B.Ziyovuddin
</a>

</div>

        </div>

    </div>

    <div class="login-box">

        <div class="login-icon">
            <i class="bi bi-person-lock"></i>
        </div>

        <h2>Admin panelga kirish</h2>

        <p>
            Login va parolingizni kiriting
        </p>

        <form id="loginForm">

            <div class="input-box">

                <i class="bi bi-person-fill input-icon"></i>

                <input
                    type="text"
                    id="username"
                    placeholder="Login"
                    autocomplete="username"
                    required
                >

            </div>

            <div class="input-box">

                <i class="bi bi-lock-fill input-icon"></i>

                <input
                    type="password"
                    id="password"
                    placeholder="Parol"
                    autocomplete="current-password"
                    required
                >

                <button
                    type="button"
                    class="password-toggle"
                    id="togglePassword"
                    aria-label="Parolni ko‘rsatish"
                >
                    <i class="bi bi-eye"></i>
                </button>

            </div>

            <button type="submit" class="login-button">

                <span>Kirish</span>

                <i class="bi bi-arrow-right"></i>

            </button>

        </form>

    </div>

</div>

<script src="js/login.js"></script>

<script>
    const togglePassword =
        document.getElementById("togglePassword");

    const passwordInput =
        document.getElementById("password");

    togglePassword.addEventListener("click", function () {
        const isPassword =
            passwordInput.type === "password";

        passwordInput.type =
            isPassword ? "text" : "password";

        togglePassword.innerHTML =
            isPassword
                ? '<i class="bi bi-eye-slash"></i>'
                : '<i class="bi bi-eye"></i>';
    });
</script>

</body>

</html>
